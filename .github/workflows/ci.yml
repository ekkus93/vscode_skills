name: CI

on:
  push:
  pull_request:

jobs:
  generated-requirements:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Verify generated requirements are up to date
        run: python -m pytest -q tests/test_generate_requirements.py

  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run Ruff
        run: python -m ruff check .

  mypy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MyPy and typing dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mypy pydantic openpyxl xlrd yfinance

      - name: Run MyPy
        run: python -m mypy .

  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pytest dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pydantic openpyxl xlrd yfinance

      - name: Run full pytest suite
        run: python -m pytest -q